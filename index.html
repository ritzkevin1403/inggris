<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Flood-Control & Power Generation System</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    :root {
      --neon-blue: #0ea5e9;
      --neon-cyan: #22d3ee;
      --dark-bg: #030712;
      --glass-bg: rgba(15, 23, 42, 0.75);
      --glass-border: rgba(34, 211, 238, 0.15);
    }
    
    body, html, section, footer, header {
      background-color: var(--dark-bg) !important;
      color: #f8fafc !important;
    }
    
    header#sec-hero {
      background-image: radial-gradient(circle at 50% 30%, rgba(14, 165, 233, 0.15), var(--dark-bg) 80%) !important;
      background-color: var(--dark-bg) !important;
    }
    
    .bg-white, .bg-slate-50, .bg-slate-100, .bg-gradient-to-br, .bg-gradient-to-b {
      background-color: rgba(15, 23, 42, 0.6) !important;
      background-image: none !important;
      color: #f8fafc !important;
      border-color: rgba(34, 211, 238, 0.1) !important;
    }
    
    body::before {
      content: ''; 
      position: fixed; 
      inset: 0; 
      z-index: -2;
      background:
        linear-gradient(rgba(14, 165, 233, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14, 165, 233, 0.02) 1px, transparent 1px);
      background-size: 45px 45px; 
      pointer-events: none;
    }
    
    body::after {
      content: ''; 
      position: fixed; 
      top: 15%; 
      left: -5vw; 
      width: 45vw; 
      height: 45vh;
      background: radial-gradient(circle, rgba(14,165,233,0.06) 0%, transparent 65%);
      border-radius: 50%; 
      pointer-events: none; 
      z-index: -1;
      animation: floatingFlare 20s ease-in-out infinite alternate;
    }
    
    @keyframes floatingFlare {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(5vw, 15vh) scale(1.15); }
    }
    
    .text-slate-900, .text-slate-800, h1, h2, h3, h4 {
      color: #ffffff !important;
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.15) !important;
    }
    .text-slate-700, .text-slate-600, .text-slate-500, .text-slate-400 {
      color: #cbd5e1 !important;
    }
    
    .x-underline-anim::after { 
      background: var(--neon-cyan) !important; 
      box-shadow: 0 0 10px var(--neon-cyan); 
    }
    .x-line-draw { 
      background: linear-gradient(90deg, var(--neon-cyan), transparent) !important; 
      box-shadow: 0 0 12px var(--neon-cyan); 
    }
    
    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-modal-pop {
      animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    .scanner-line {
      position: absolute; 
      left: 0; 
      width: 100%; 
      height: 2px;
      background: var(--neon-cyan); 
      box-shadow: 0 0 20px 4px rgba(34, 211, 238, 0.5);
      animation: scanPass 4s ease-in-out infinite; 
      opacity: 0.6; 
      pointer-events: none; 
      z-index: 10;
    }
    
    @keyframes scanPass {
      0% { top: 0%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }
    
    .sci-fi-scrollbar::-webkit-scrollbar { width: 4px; }
    .sci-fi-scrollbar::-webkit-scrollbar-track { background: rgba(15,23,42,0.5); }
    .sci-fi-scrollbar::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 4px; }

    @keyframes waterFlow {
      0% { stroke-dashoffset: 40; }
      100% { stroke-dashoffset: 0; }
    }
    .animate-water-flow { animation: waterFlow 1s linear infinite; }

    @keyframes energyFlow {
      0% { stroke-dashoffset: 20; opacity: 1; }
      50% { opacity: 0.5; }
      100% { stroke-dashoffset: 0; opacity: 1; }
    }
    .animate-energy-flow { animation: energyFlow 0.5s linear infinite; }
    
    @keyframes turbineSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .spin-fast {
      animation: turbineSpin 0.5s linear infinite;
      transform-origin: 750px 500px;
    }
    
    @keyframes signalPulse {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    .signal-wave {
      animation: signalPulse 1.5s ease-out infinite;
      transform-origin: center;
    }
    
    * { cursor: none !important; }
    #x-cursor {
      position: fixed; width: 10px; height: 10px;
      background: #3b82f6; border-radius: 50%;
      pointer-events: none; z-index: 99999999;
      transform: translate(-50%,-50%);
      transition: transform 0.05s ease, width 0.2s ease, height 0.2s ease, background 0.2s ease;
    }
    #x-cursor-ring {
      position: fixed; width: 32px; height: 32px;
      border: 1.5px solid rgba(59,130,246,0.6); border-radius: 50%;
      pointer-events: none; z-index: 99999998;
      transform: translate(-50%,-50%);
      transition: transform 0.12s ease, width 0.2s, height 0.2s, border-color 0.2s;
    }
    .cursor-hover #x-cursor { width: 16px; height: 16px; background: #60a5fa; }
    .cursor-hover #x-cursor-ring { width: 44px; height: 44px; border-color: rgba(96,165,250,0.5); }
    
    #x-progress {
      position: fixed; top: 0; left: 0; height: 3px;
      background: linear-gradient(90deg, #1d4ed8, #38bdf8, #1d4ed8);
      background-size: 200% 100%;
      animation: progressShimmer 2s ease infinite;
      z-index: 99997; width: 0%;
      transition: width 0.1s linear;
    }
    @keyframes progressShimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    
    #x-story {
      position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
      z-index: 1000; display: flex; flex-direction: column; gap: 10px;
    }
    .story-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
      transition: all 0.3s ease; cursor: pointer !important;
      position: relative;
    }
    .story-dot.active {
      background: #3b82f6; border-color: #60a5fa;
      box-shadow: 0 0 10px rgba(59,130,246,0.7);
    }
    .story-dot:hover { background: rgba(96,165,250,0.5); }
    .story-dot-label {
      position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
      font-size: 11px; color: rgba(255,255,255,0.7); white-space: nowrap;
      background: rgba(15,23,42,0.85); padding: 3px 10px; border-radius: 4px;
      pointer-events: none; opacity: 0; transition: opacity 0.2s ease;
      font-family: system-ui, sans-serif;
    }
    .story-dot:hover .story-dot-label { opacity: 1; }
    
    #x-particles {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      opacity: 0.35;
    }
    
    [data-rev] {
      opacity: 0;
      transition: opacity 0.75s cubic-bezier(0.16,1,0.3,1),
                  transform 0.75s cubic-bezier(0.16,1,0.3,1);
    }
    [data-rev="up"]   { transform: translateY(40px); }
    [data-rev="left"] { transform: translateX(-48px); }
    [data-rev="right"]{ transform: translateX(48px); }
    [data-rev="scale"]{ transform: scale(0.88); }
    [data-rev="fade"] { transform: none; }
    [data-rev].x-vis  { opacity: 1; transform: none !important; }
    
    .x-ripple-wrap { position: relative; overflow: hidden; }
    .x-ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.35); pointer-events: none;
      transform: scale(0);
      animation: rippleOut 0.55s ease forwards;
    }
    @keyframes rippleOut {
      to { transform: scale(4); opacity: 0; }
    }
    
    .x-tilt {
      transform-style: preserve-3d;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      will-change: transform;
    }
    
    .x-section-enter {
      animation: sectionSlide 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    @keyframes sectionSlide {
      from { opacity:0; transform: translateY(30px); }
      to   { opacity:1; transform: none; }
    }
    
    .x-hero-layer { will-change: transform; }
    
    .x-counter { display: inline-block; }
    
    .x-wave {
      position: relative; height: 60px; overflow: hidden;
      pointer-events: none;
    }
    .x-wave svg { position: absolute; bottom: 0; width: 100%; }
    .x-wave path { animation: waveDrift 6s ease-in-out infinite alternate; }
    @keyframes waveDrift {
      from { d: path("M0,40 C200,10 400,60 600,35 C800,10 1000,55 1200,30 L1200,60 L0,60 Z"); }
      to   { d: path("M0,30 C200,55 400,15 600,45 C800,70 1000,20 1200,45 L1200,60 L0,60 Z"); }
    }
    
    .x-glow-num {
      text-shadow: 0 0 30px rgba(59,130,246,0.4), 0 0 60px rgba(59,130,246,0.15);
    }
    
    .x-stagger > * { opacity: 0; transform: translateY(24px); }
    .x-stagger.x-vis > *:nth-child(1) { animation: fadeUp 0.6s ease 0.0s forwards; }
    .x-stagger.x-vis > *:nth-child(2) { animation: fadeUp 0.6s ease 0.1s forwards; }
    .x-stagger.x-vis > *:nth-child(3) { animation: fadeUp 0.6s ease 0.2s forwards; }
    .x-stagger.x-vis > *:nth-child(4) { animation: fadeUp 0.6s ease 0.3s forwards; }
    .x-stagger.x-vis > *:nth-child(5) { animation: fadeUp 0.6s ease 0.4s forwards; }
    .x-stagger.x-vis > *:nth-child(6) { animation: fadeUp 0.6s ease 0.5s forwards; }
    @keyframes fadeUp {
      to { opacity: 1; transform: none; }
    }
    
    .x-underline-anim {
      position: relative; display: inline-block;
    }
    .x-underline-anim::after {
      content: ''; position: absolute; bottom: -4px; left: 0;
      height: 3px; width: 0%; background: #3b82f6;
      transition: width 1s cubic-bezier(0.16,1,0.3,1);
      border-radius: 2px;
    }
    .x-underline-anim.x-vis::after { width: 100%; }
    
    @keyframes floatDown {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(8px); }
    }
    .x-float { animation: floatDown 2s ease-in-out infinite; }
    
    .x-line-draw {
      width: 0; height: 2px; background: linear-gradient(90deg, #3b82f6, transparent);
      transition: width 1.2s cubic-bezier(0.16,1,0.3,1);
    }
    .x-line-draw.x-vis { width: 100%; }
    
    @keyframes borderPop {
      from { border-bottom-width: 0px; }
      to   { border-bottom-width: 4px; }
    }
    .x-border-anim { border-bottom-width: 0 !important; }
    .x-border-anim.x-vis { animation: borderPop 0.5s ease 0.4s forwards; }
    
    #x-scroll-hint {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%);
      z-index: 900;
      opacity: 1; transition: opacity 0.5s ease;
    }
    #x-scroll-hint.hidden { opacity: 0; pointer-events: none; }
    .x-scroll-arrow {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .x-scroll-arrow span {
      font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(255,255,255,0.5); font-family: system-ui;
    }
    .x-arrow-line {
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, rgba(96,165,250,0.8), transparent);
      animation: arrowPulse 1.8s ease-in-out infinite;
    }
    @keyframes arrowPulse {
      0%, 100% { opacity: 1; transform: scaleY(1); }
      50%      { opacity: 0.2; transform: scaleY(0.5); }
    }
    
    #x-loader {
      position: fixed; inset: 0; background: #0f172a;
      z-index: 99999999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      transition: opacity 0.7s ease;
    }
    #x-loader.out { opacity: 0; pointer-events: none; }
    .loader-text {
      font-family: system-ui; font-weight: 800;
      font-size: 1.1rem; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.85); text-transform: uppercase;
    }
    .loader-bar-track {
      width: 200px; height: 2px; background: rgba(255,255,255,0.1);
    }
    .loader-bar-fill {
      height: 100%; background: linear-gradient(90deg, #1d4ed8, #38bdf8);
      animation: loaderFill 1.4s ease forwards;
    }
    @keyframes loaderFill {
      from { width: 0%; }
      to   { width: 100%; }
    }
    .loader-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #3b82f6;
      animation: loaderDots 0.8s ease infinite alternate;
    }
    @keyframes loaderDots {
      from { opacity: 0.3; transform: scale(0.8); }
      to   { opacity: 1;   transform: scale(1.2); }
    }
    
    .x-tooltip-wrap { position: relative; }
    .x-tooltip {
      position: absolute; bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: rgba(15,23,42,0.95); color: rgba(255,255,255,0.9);
      font-size: 11px; padding: 5px 10px; border-radius: 4px;
      white-space: nowrap; pointer-events: none; opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      font-family: system-ui; border: 1px solid rgba(59,130,246,0.3);
      z-index: 100;
    }
    .x-tooltip-wrap:hover .x-tooltip {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }
    
    .x-magnetic { transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased overflow-x-hidden">
  
  <div id="x-loader">
    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
      <div class="loader-text">Loading System</div>
      <div class="loader-bar-track"><div class="loader-bar-fill"></div></div>
      <div style="display:flex;gap:6px;margin-top:4px;">
        <div class="loader-dot" style="animation-delay:0s"></div>
        <div class="loader-dot" style="animation-delay:0.15s"></div>
        <div class="loader-dot" style="animation-delay:0.3s"></div>
      </div>
    </div>
  </div>
  
  <div id="x-progress"></div>
  <div id="x-cursor"></div>
  <div id="x-cursor-ring"></div>
  <canvas id="x-particles"></canvas>
  
  <div id="x-story"></div>
  
  <div id="x-scroll-hint">
    <div class="x-scroll-arrow">
      <span>Scroll</span>
      <div class="x-arrow-line"></div>
    </div>
  </div>
  
  <div id="root"></div>

  <!-- ================================================================
       SINGLE React script — App component contains ALL modals & state
       ================================================================ -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    
    const App = () => {
      const [phase, setPhase] = useState(0);
      const [isSimulating, setIsSimulating] = useState(false);
      const [isUnlocked, setIsUnlocked] = useState(false);

      // Modal States
      const [isBlueprintOpen, setIsBlueprintOpen] = useState(false);
      const [activeSystemState, setActiveSystemState] = useState(null);
      const [isImpactPhotoOpen, setIsImpactPhotoOpen] = useState(false);

      //separate zoom/drag state for Blueprint modal
      const [bpScale, setBpScale] = useState(1);
      const [bpPos, setBpPos]   = useState({ x: 0, y: 0 });
      const bpDragging  = useRef(false);
      const bpStartDrag = useRef({ x: 0, y: 0 });

      // separate zoom/drag state for Impact Photo modal
      const [ipScale, setIpScale] = useState(1);
      const [ipPos, setIpPos]     = useState({ x: 0, y: 0 });
      const ipDragging  = useRef(false);
      const ipStartDrag = useRef({ x: 0, y: 0 });

      // Accordion States
      const [openProblem, setOpenProblem] = useState(null);
      const [openSolution, setOpenSolution] = useState(null);
      const [openSetup, setOpenSetup] = useState(null);
      
      const runSimulation = () => {
        if (isSimulating) return;
        setIsSimulating(true);
        setPhase(0);
        setTimeout(() => setPhase(1), 1000);
        setTimeout(() => setPhase(2), 4000);
        setTimeout(() => setPhase(3), 6000);
        setTimeout(() => setPhase(4), 8000);
        setTimeout(() => setIsSimulating(false), 9000);
      };
      
      const resetSimulation = () => { setPhase(0); setIsSimulating(false); };
      
      const waterLevelY  = phase === 0 ? 350 : (phase >= 1 ? 220 : 350);
      const isDanger     = phase >= 2;
      const isValveOpen  = phase >= 3;
      const isGenerating = phase >= 4;

      /* ── Blueprint modal helpers ── */
      const bpZoomIn    = () => setBpScale(p => Math.min(p + 0.25, 3));
      const bpZoomOut   = () => setBpScale(p => Math.max(p - 0.25, 0.5));
      const bpZoomReset = () => { setBpScale(1); setBpPos({ x: 0, y: 0 }); };
      const bpMouseDown = (e) => {
        bpDragging.current = true;
        bpStartDrag.current = { x: e.clientX - bpPos.x, y: e.clientY - bpPos.y };
      };
      const bpMouseMove = (e) => {
        if (!bpDragging.current) return;
        setBpPos({ x: e.clientX - bpStartDrag.current.x, y: e.clientY - bpStartDrag.current.y });
      };
      const bpMouseUp = () => { bpDragging.current = false; };

      /* ── Impact Photo modal helpers ── */
      const ipZoomIn    = () => setIpScale(p => Math.min(p + 0.25, 3));
      const ipZoomOut   = () => setIpScale(p => Math.max(p - 0.25, 0.5));
      const ipZoomReset = () => { setIpScale(1); setIpPos({ x: 0, y: 0 }); };
      const ipMouseDown = (e) => {
        ipDragging.current = true;
        ipStartDrag.current = { x: e.clientX - ipPos.x, y: e.clientY - ipPos.y };
      };
      const ipMouseMove = (e) => {
        if (!ipDragging.current) return;
        setIpPos({ x: e.clientX - ipStartDrag.current.x, y: e.clientY - ipStartDrag.current.y });
      };
      const ipMouseUp = () => { ipDragging.current = false; };
      
      return (
        <div className="flex flex-col min-h-screen bg-slate-950 text-slate-100">

          {/* HERO */}
          <header id="sec-hero" className="relative pt-24 pb-20 px-4 flex flex-col justify-center min-h-screen">
            <div className="relative z-10 max-w-5xl mx-auto text-center x-hero-layer mt-12">
              <h2 className="text-cyan-400 font-bold tracking-[0.2em] uppercase text-sm md:text-base mb-4">
                An invention towards sustainability
              </h2>
              <h1 className="text-5xl md:text-7xl font-extrabold tracking-tight mb-6 drop-shadow-lg">
                PREVENTING <span className="text-cyan-400 x-underline-anim">FLOODS</span>
              </h1>
              <p className="text-xl md:text-2xl text-slate-300 mb-12 max-w-3xl mx-auto font-light">
                Smart Flood-Control Hydropower Barrier System.<br/>
                Stopping overflows before they become disasters and converting them into renewable energy.
              </p>
              <div className="flex flex-col sm:flex-row justify-center items-center gap-6">
                <button 
                  onClick={() => document.getElementById('simulation').scrollIntoView({ behavior: 'smooth' })}
                  className="x-ripple-wrap x-magnetic bg-cyan-600 hover:bg-cyan-500 text-white font-semibold py-4 px-8 rounded-full transition-all hover:scale-105 border border-cyan-400/50 shadow-[0_0_20px_rgba(34,211,238,0.4)]"
                >
                  Go to Simulation Section
                </button>
              </div>
            </div>
          </header>
          
          {/* TEAM */}
          <section id="sec-team" className="py-8 bg-slate-900 text-slate-300 border-b border-slate-800 relative z-20">
            <div className="max-w-6xl mx-auto px-4 text-center">
              <h3 className="text-sm font-bold uppercase tracking-widest text-cyan-500 mb-4">Developed By Our Team</h3>
              {/* FIX: x-stagger must wrap children directly — moved to a div wrapper */}
              <div className="flex flex-wrap justify-center gap-x-8 gap-y-2 text-lg font-medium x-stagger">
                <span>Fatih Zahran</span>
                <span>Noel Alexander Hartono</span>
                <span>Michael Sahala</span>
                <span>Ritz Kevin Heryanto</span>
              </div>
            </div>
          </section>
          
          {/* WHAT IS OUR SYSTEM */}
          <section id="sec-what" className="py-20 px-4 bg-slate-950 border-b border-slate-900 relative z-20">
            <div className="max-w-5xl mx-auto">
              <div className="text-center mb-12">
                <h2 className="text-4xl font-extrabold text-white tracking-tight mb-4 x-underline-anim">What is our system?</h2>
                <div className="h-1.5 w-24 bg-cyan-400 mx-auto rounded-full x-line-draw"></div>
              </div>
              <div className="bg-slate-900/40 rounded-3xl p-8 md:p-12 shadow-lg border border-slate-800 flex flex-col md:flex-row items-center gap-8">
                <div className="flex-1 space-y-6" data-rev="left">
                  <p className="text-xl leading-relaxed text-slate-300 font-normal">
                    The water gate barrier is an <span className="text-cyan-400 font-semibold">advanced machine</span> mainly used for siphoning excess amounts of water to prevent floods and recycle it for electricity.
                  </p>
                  <p className="text-lg leading-relaxed text-slate-400">
                    The device works slowly: first, the machine is in a closed state.
                    When the system detects high amounts of water, it will automatically open to expose an underground pipe which drains the water.
                    This water is then processed and turned into clean electricity.
                  </p>
                </div>
                <div className="w-full md:w-80 grid grid-cols-2 gap-4 x-stagger" data-rev="right">
                  {[
                    { title:'1. Closed State', icon:<path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>, color:'cyan', sub:'Normal operating standby', detail:'The gateway system remains in a fully secured standby status. All hydraulic segments are tightly sealed, preventing any surface water bypass and maintaining normal river flow.' },

              {/* SOLUTIONS */}

                    { n:'01', title:'1. Position Barrier', desc:'Place the wedge flood barrier near the target riverbank or drainage overflow containment zone. Secure structural brackets on reinforced bedrock.',

                    { n:'02', title:'2. Connect Pipes', desc:'Ensure the subsurface drainage and diversion pipe fittings are securely sealed and properly aligned with the generator turbine inlet.',

                    { n:'03', title:'3. Activate Sensors', desc:'Power up the electronic telemetry system and activate pressure/depth sensors on the wet side. Calibrate zero-offset parameters.',

                    { n:'04', title:'4. Monitor Levels', desc:'Continuously track water pressure metrics and telemetry dashboard status for normal operation. Configure critical warning triggers.',

                    { n:'05', title:'5. Automatic Response', desc:'Allow the gate valve to open dynamically as hydrostatic pressure exceeds critical set boundaries. Ensure fast and frictionless actuation.',

              <div className="w-[98vw] h-[96vh] flex border border-cyan-500/20 bg-slate-900 rounded-2xl relative z-10 overflow-hidden shadow-[0_0_40px_rgba(34,211,238,0.15)]">
                <div 
                  className="flex-1 relative bg-[#030712] overflow-hidden flex items-center justify-center select-none"

                  <div className="absolute bottom-6 right-6 flex gap-3 z-50 bg-slate-900/80 p-3 rounded-xl border border-cyan-500/40 backdrop-blur-sm font-mono text-xs text-cyan-400">
                    <button onClick={ipZoomIn}    className="px-4 py-2 bg-slate-800/80 border border-slate-700 rounded-lg hover:bg-cyan-500 hover:text-slate-950 font-bold transition-all cursor-pointer">ZOOM IN (+)</button>
                    <button onClick={ipZoomOut}   className="px-4 py-2 bg-slate-800/80 border border-slate-700 rounded-lg hover:bg-cyan-500 hover:text-slate-950 font-bold transition-all cursor-pointer">ZOOM OUT (-)</button>
                    <button onClick={ipZoomReset} className="px-4 py-2 bg-slate-800/80 border border-slate-700 rounded-lg hover:bg-rose-500 hover:border-rose-400 hover:text-white font-bold transition-all cursor-pointer">RESET</button>

    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    (function() {
      'use strict';
      
      function onReady(fn) {
        if (document.readyState === 'complete') { 
          setTimeout(fn, 200); 
        } else { 
          window.addEventListener('load', () => setTimeout(fn, 200)); 
        }
      }
      
      /* ── 1. LOADING OVERLAY ── */
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('x-loader');
          if (loader) { 
            loader.classList.add('out'); 
            setTimeout(() => loader.remove(), 800); 
          }
        }, 1500);
      });
      
      onReady(function() {
        /* ── 2. CUSTOM CURSOR ── */
        const cur  = document.getElementById('x-cursor');
        const ring = document.getElementById('x-cursor-ring');
        let mx = 0, my = 0, rx = 0, ry = 0;
        
        document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
        
        (function animCursor() {
          cur.style.left  = mx + 'px';
          cur.style.top   = my + 'px';
          rx += (mx - rx) * 0.13;
          ry += (my - ry) * 0.13;
          ring.style.left = rx + 'px';
          ring.style.top  = ry + 'px';
          requestAnimationFrame(animCursor);
        })();
        
        document.querySelectorAll('a,button,[data-hover],li').forEach(el => {
          el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
          el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
        });
        
        /* ── 3. SCROLL PROGRESS BAR ── */
        const pgbar = document.getElementById('x-progress');
        window.addEventListener('scroll', () => {
          const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
          pgbar.style.width = Math.min(100, pct) + '%';
        }, { passive: true });
        
        /* ── 4. SCROLL HINT ── */
        const hint = document.getElementById('x-scroll-hint');
        window.addEventListener('scroll', () => {
          if (window.scrollY > 80) hint.classList.add('hidden');
          else hint.classList.remove('hidden');
        }, { passive: true });
        
        /* ── 5. STORY NAVIGATION DOTS ── */
        const sections = [
          { id:'sec-hero',    label:'Home' },
          { id:'sec-what',    label:'System' },
          { id:'sec-problem', label:'Problem' },
          { id:'sec-setup',   label:'Setup' },
          { id:'simulation',  label:'Simulation' },
          { id:'sec-impact',  label:'Impact' },
          { id:'sec-footer',  label:'Closing' },
        ];
        
        const storyNav = document.getElementById('x-story');
        sections.forEach((s) => {
          const dot = document.createElement('div');
          dot.className = 'story-dot x-tooltip-wrap';
          dot.innerHTML = `<div class="x-tooltip">${s.label}</div>`;
          dot.addEventListener('click', () => {
            const el = document.getElementById(s.id);
            if (el) el.scrollIntoView({ behavior: 'smooth' });
          });
          storyNav.appendChild(dot);
        });
        
        const allDots = storyNav.querySelectorAll('.story-dot');
        function updateStoryDots() {
          sections.forEach((s, i) => {
            const el = document.getElementById(s.id);
            if (!el) return;
            const rect = el.getBoundingClientRect();
            if (rect.top <= window.innerHeight / 2 && rect.bottom >= window.innerHeight / 2) {
              allDots[i].classList.add('active');
            } else {
              allDots[i].classList.remove('active');
            }
          });
        }
        window.addEventListener('scroll', updateStoryDots, { passive: true });
        updateStoryDots();
        
        /* ── 6. SCROLL REVEAL ── */
        const revObs = new IntersectionObserver(entries => {
          entries.forEach(e => {
            if (e.isIntersecting) { e.target.classList.add('x-vis'); revObs.unobserve(e.target); }
          });
        }, { threshold: 0.12 });
        
        document.querySelectorAll('h2, h3').forEach(el => {
          if (!el.hasAttribute('data-rev')) { el.setAttribute('data-rev', 'up'); revObs.observe(el); }
        });
        document.querySelectorAll('[data-rev]').forEach(el => revObs.observe(el));
        
        const ulObs = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('x-vis'); });
        }, { threshold: 0.5 });
        document.querySelectorAll('.x-underline-anim, .x-line-draw').forEach(el => ulObs.observe(el));
        
        const staggerObs = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('x-vis'); });
        }, { threshold: 0.15 });
        document.querySelectorAll('.x-stagger').forEach(el => staggerObs.observe(el));
        
        /* ── 7. RIPPLE EFFECT ── */
        function addRipple(e, btn) {
          const rect = btn.getBoundingClientRect();
          const size = Math.max(rect.width, rect.height) * 1.5;
          const x = e.clientX - rect.left - size/2;
          const y = e.clientY - rect.top  - size/2;
          const rip = document.createElement('span');
          rip.className = 'x-ripple';
          rip.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;`;
          btn.appendChild(rip);
          setTimeout(() => rip.remove(), 600);
        }
        document.addEventListener('click', e => {
          const btn = e.target.closest('.x-ripple-wrap, button');
          if (btn) addRipple(e, btn);
        });
        
        /* ── 8. CARD TILT ── */
        function initTilt(el) {
          el.addEventListener('mousemove', e => {
            const r  = el.getBoundingClientRect();
            const x  = (e.clientX - r.left) / r.width  - 0.5;
            const y  = (e.clientY - r.top)  / r.height - 0.5;
            el.style.transform = `perspective(600px) rotateX(${y * -8}deg) rotateY(${x * 8}deg) scale3d(1.02,1.02,1.02)`;
          });
          el.addEventListener('mouseleave', () => { el.style.transform = ''; });
        }
        document.querySelectorAll('.x-tilt').forEach(initTilt);
        
        /* ── 9. MAGNETIC BUTTON ── */
        document.querySelectorAll('.x-magnetic').forEach(btn => {
          btn.addEventListener('mousemove', e => {
            const r  = btn.getBoundingClientRect();
            const dx = e.clientX - (r.left + r.width/2);
            const dy = e.clientY - (r.top  + r.height/2);
            btn.style.transform = `translate(${dx*0.2}px, ${dy*0.2}px)`;
          });
          btn.addEventListener('mouseleave', () => btn.style.transform = '');
        });
        
        /* ── 10. HERO PARALLAX ── */
        const heroLayer = document.querySelector('.x-hero-layer');
        window.addEventListener('scroll', () => {
          if (!heroLayer) return;
          heroLayer.style.transform = `translateY(${window.scrollY * 0.35}px)`;
        }, { passive: true });
        
        /* ── 11. WATER PARTICLES CANVAS ── */
        const pc   = document.getElementById('x-particles');
        const pctx = pc.getContext('2d');
        function resizePC() { pc.width = window.innerWidth; pc.height = window.innerHeight; }
        resizePC();
        window.addEventListener('resize', resizePC);
        
        const drops = Array.from({ length: 55 }, () => ({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 3 + 1,
          vy: -(Math.random() * 0.4 + 0.1),
          vx: (Math.random() - 0.5) * 0.3,
          a: Math.random() * 0.5 + 0.1,
          pulse: Math.random() * Math.PI * 2,
        }));
        
        function drawParticles() {
          pctx.clearRect(0, 0, pc.width, pc.height);
          drops.forEach(d => {
            d.y += d.vy; d.x += d.vx; d.pulse += 0.02;
            if (d.y < -20) { d.y = pc.height + 20; d.x = Math.random() * pc.width; }
            if (d.x < -20)            d.x = pc.width + 20;
            if (d.x > pc.width + 20)  d.x = -20;
            const alpha = d.a * (0.6 + Math.sin(d.pulse) * 0.4);
            pctx.beginPath();
            pctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
            pctx.fillStyle = `rgba(34,211,238,${alpha})`;
            pctx.fill();
            pctx.beginPath();
            pctx.moveTo(d.x, d.y + d.r);
            pctx.lineTo(d.x - 1, d.y + d.r + d.r * 2.5);
            pctx.lineTo(d.x + 1, d.y + d.r + d.r * 2.5);
            pctx.closePath();
            pctx.fillStyle = `rgba(14,165,233,${alpha * 0.4})`;
            pctx.fill();
          });
          if (window.scrollY < window.innerHeight) {
            for (let i = 0; i < drops.length; i++) {
              for (let j = i+1; j < drops.length; j++) {
                const dx = drops[i].x - drops[j].x;
                const dy = drops[i].y - drops[j].y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 100) {
                  pctx.beginPath();
                  pctx.moveTo(drops[i].x, drops[i].y);
                  pctx.lineTo(drops[j].x, drops[j].y);
                  pctx.strokeStyle = `rgba(34,211,238,${0.05 * (1 - dist/100)})`;
                  pctx.lineWidth = 0.5;
                  pctx.stroke();
                }
              }
            }
          }
          requestAnimationFrame(drawParticles);
        }
        drawParticles();
        
        /* ── 12. RE-INIT dynamic elements ── */
        const mutObs = new MutationObserver(() => {
          document.querySelectorAll('.x-tilt:not([data-tilt-init])').forEach(el => {
            el.setAttribute('data-tilt-init', '1');
            initTilt(el);
          });
          document.querySelectorAll('[data-rev]:not([data-obs-init])').forEach(el => {
            el.setAttribute('data-obs-init', '1');
            revObs.observe(el);
          });
        });
        mutObs.observe(document.body, { childList: true, subtree: true });
        
        /* ── 13. KEYBOARD NAV ── */
        document.addEventListener('keydown', e => {
          const secEls = sections.map(s => document.getElementById(s.id)).filter(Boolean);
          const curr = secEls.findIndex(el => el.getBoundingClientRect().top >= -100);
          if (e.key === 'ArrowDown' && curr < secEls.length - 1) {
            e.preventDefault();
            secEls[curr + 1].scrollIntoView({ behavior: 'smooth' });
          }
          if (e.key === 'ArrowUp' && curr > 0) {
            e.preventDefault();
            secEls[Math.max(0, curr - 1)].scrollIntoView({ behavior: 'smooth' });
          }
        });
      });
    })();
  </script>
</body>
</html>
